<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f5f0e8">
  <title>China Trip 2026</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Kanit:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <style>
    * { font-family: 'Kanit', 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    .font-display { font-family: 'Playfair Display', serif; }
    
    /* แก้ไขเรื่องความสูงให้เสถียรบน iPad/iOS */
    html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; }
    #app { height: 100%; display: flex; flex-direction: column; }
    @media (min-width: 768px) { #app { flex-direction: row; } }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #faf7f2; }
    ::-webkit-scrollbar-thumb { background: #d4a574; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #c4956a; }
    
    /* Animations */
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
    
    /* Card & Effects */
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(180, 83, 9, 0.15); }
    .btn-primary { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); transition: all 0.3s ease; }
    .btn-primary:active { transform: scale(0.95); }
    .bg-gradient-gold { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
    .bg-gradient-cream { background: linear-gradient(180deg, #faf7f2 0%, #f5f0e8 100%); }
    
    /* Nav & Sidebar */
    .nav-item { transition: all 0.2s ease; }
    .nav-item.active { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); color: white; }
    .nav-item.active span, .nav-item.active svg { color: white !important; }
    .mobile-menu { transform: translateX(-100%); transition: transform 0.3s ease; }
    .mobile-menu.open { transform: translateX(0); }
    .modal-backdrop { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); }

    /* Forms & Checkbox */
    input:focus, textarea:focus, select:focus { outline: none; border-color: #d4a574; }
    .checkbox-custom { appearance: none; width: 22px; height: 22px; border: 2px solid #d4a574; border-radius: 6px; background: white; transition: all 0.2s; cursor: pointer; }
    .checkbox-custom:checked { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); border-color: #dc2626; }
    .checkbox-custom:checked::after { content: '✓'; display: flex; align-items: center; justify-content: center; color: white; height: 100%; font-size: 14px; font-weight: bold; }

    /* Drag & Drop */
    .sortable-ghost { opacity: 0.4; background: #fef3c7; border: 2px dashed #d4a574; }
    .sortable-drag { cursor: grabbing !important; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: scale(1.02); z-index: 100; }
    .drag-handle { touch-action: none; }
  </style>
</head>
<body class="bg-gradient-cream">
  <div id="app">
    <header class="md:hidden bg-white border-b border-amber-200 px-4 py-3 flex items-center justify-between z-50 flex-shrink-0">
      <button id="mobileMenuBtn" class="p-2 rounded-lg hover:bg-amber-50 transition-colors">
        <svg class="w-6 h-6 text-amber-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="font-display text-lg font-semibold text-amber-900" id="mobileTitle">ทริปจีนของวิว</h1>
      <div class="w-10"></div>
    </header>

    <div id="mobileMenuOverlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="closeMobileMenu()"></div>

    <aside id="sidebar" class="mobile-menu fixed md:relative z-50 w-72 md:w-64 h-full bg-white border-r border-amber-200 flex flex-col shadow-xl md:shadow-none flex-shrink-0">
      <div class="p-5 border-b border-amber-100 flex-shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-red-500 to-red-700 flex items-center justify-center shadow-lg"><span class="text-white text-lg">✈️</span></div>
          <div>
            <h1 class="font-display text-lg font-bold text-amber-900 leading-tight">ทริปจีนของวิว</h1>
            <p class="text-xs text-amber-600">12-18 มีนาคม 2026</p>
          </div>
        </div>
      </div>
      
      <nav class="flex-1 overflow-y-auto p-3 space-y-1">
        <button onclick="navigateTo('home')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-amber-700 hover:bg-amber-50" data-page="home">
          <span class="text-lg">🏠</span> <span class="font-medium text-sm">หน้าหลัก (Dashboard)</span>
        </button>
        
        <div class="pt-3">
          <p class="px-4 py-2 text-[10px] font-semibold text-amber-500 uppercase tracking-widest">แพลนรายวัน</p>
          <div class="space-y-1">
            <button onclick="navigateTo('day1')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="day1"><span class="w-6 h-6 rounded-lg bg-red-100 text-red-600 flex items-center justify-center text-xs font-bold">1</span><span class="text-sm">วันที่ 1</span></button>
            <button onclick="navigateTo('day2')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="day2"><span class="w-6 h-6 rounded-lg bg-red-100 text-red-600 flex items-center justify-center text-xs font-bold">2</span><span class="text-sm">วันที่ 2</span></button>
            <button onclick="navigateTo('day3')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="day3"><span class="w-6 h-6 rounded-lg bg-red-100 text-red-600 flex items-center justify-center text-xs font-bold">3</span><span class="text-sm">วันที่ 3</span></button>
            <button onclick="navigateTo('day4')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="day4"><span class="w-6 h-6 rounded-lg bg-red-100 text-red-600 flex items-center justify-center text-xs font-bold">4</span><span class="text-sm">วันที่ 4</span></button>
            <button onclick="navigateTo('day5')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="day5"><span class="w-6 h-6 rounded-lg bg-red-100 text-red-600 flex items-center justify-center text-xs font-bold">5</span><span class="text-sm">วันที่ 5</span></button>
            <button onclick="navigateTo('day6')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="day6"><span class="w-6 h-6 rounded-lg bg-red-100 text-red-600 flex items-center justify-center text-xs font-bold">6</span><span class="text-sm">วันที่ 6</span></button>
            <button onclick="navigateTo('day7')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="day7"><span class="w-6 h-6 rounded-lg bg-red-100 text-red-600 flex items-center justify-center text-xs font-bold">7</span><span class="text-sm">วันที่ 7</span></button>
          </div>
        </div>

        <div class="pt-3">
          <p class="px-4 py-2 text-[10px] font-semibold text-amber-500 uppercase tracking-widest">จัดการทริป</p>
          <div class="space-y-1">
            <button onclick="navigateTo('shanghai')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="shanghai"><span class="text-lg">🏙️</span><span class="text-sm">เซี่ยงไฮ้</span></button>
            <button onclick="navigateTo('nanjing')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="nanjing"><span class="text-lg">🏛️</span><span class="text-sm">หนานจิง</span></button>
            <button onclick="navigateTo('budget')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="budget"><span class="text-lg">💰</span><span class="text-sm">งบประมาณ</span></button>
            <button onclick="navigateTo('hotel')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="hotel"><span class="text-lg">🏨</span><span class="text-sm">ที่พัก & แท็กซี่</span></button>
            <button onclick="navigateTo('checklist')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="checklist"><span class="text-lg">✅</span><span class="text-sm">เช็คลิสต์</span></button>
            <button onclick="navigateTo('notes')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="notes"><span class="text-lg">📝</span><span class="text-sm">สมุดโน้ต</span></button>
            <button onclick="navigateTo('survival')" class="nav-item w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-amber-700 hover:bg-amber-50" data-page="survival"><span class="text-lg">🀄️</span><span class="text-sm font-bold text-red-600">การ์ดเอาตัวรอด</span></button>
          </div>
        </div>
      </nav>
      
      <div class="p-4 border-t border-amber-100 flex-shrink-0">
        <div class="flex items-center gap-3 px-3 py-2 rounded-xl bg-gradient-gold shadow-inner">
          <span class="text-2xl animate-float">🐼</span>
          <div><p class="text-xs font-medium text-amber-800">นับถอยหลัง</p><p class="text-xs text-amber-600 font-bold" id="countdownText">กำลังโหลด...</p></div>
        </div>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-gradient-cream" id="mainContent"></main>
  </div>

  <div id="modalContainer" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
    <div class="relative w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-y-auto max-h-[90vh] animate-fade-in" id="modalContent"></div>
  </div>
  <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-11/12 max-w-sm z-50 space-y-2 pointer-events-none flex flex-col items-center"></div>

  <script>
    // ==================== 1. DATA & OFFLINE-FIRST SYNC ====================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwEDTxviQO0Vp0t7sWdM7xyByU9HO6PSHqitsAN1LDmV-agdepZzrZQYrKDlEDZDQN6Zw/exec';
    
    // โครงสร้างตั้งต้น
    let appData = {
      tripName: 'ทริปเซี่ยงไฮ้-หนานจิง', travelerName: 'View', startDate: '2026-03-12', endDate: '2026-03-18',
      activities: { day1:[], day2:[], day3:[], day4:[], day5:[], day6:[], day7:[] }, shanghai: [], nanjing: [],
      budget: { categories: [ { id: 'flight', name: 'ค่าตั๋ว', icon: '✈️', planned: 15000 }, { id: 'hotel', name: 'ค่าที่พัก', icon: '🏨', planned: 8000 }, { id: 'transport', name: 'เดินทาง', icon: '🚇', planned: 3000 }, { id: 'food', name: 'อาหาร', icon: '🍜', planned: 5000 }, { id: 'shopping', name: 'ช้อปปิ้ง', icon: '🛍️', planned: 5000 } ], expenses: [] },
      hotels: [], notes: [], checklist: { 'เตรียมตัว': [{ id: 1, text: 'พาสปอร์ต (อายุ 6 เดือน+)', done: false }] }
    };
    
    let currentPage = 'home'; let editingItem = null;

    // ดึงข้อมูลจาก LocalStorage ให้แสดงผลทันที (ไม่หน่วง)
    const localData = localStorage.getItem('chinaTripData');
    if (localData) { appData = JSON.parse(localData); }

    // แอบซิงก์ข้อมูลจาก Google Sheets แบบเบื้องหลัง
    async function backgroundSync() {
      try {
        const res = await fetch(SCRIPT_URL);
        const cloud = await res.json();
        if (cloud && Object.keys(cloud).length > 0) {
          if (cloud.Activities) { appData.activities = { day1:[], day2:[], day3:[], day4:[], day5:[], day6:[], day7:[] }; cloud.Activities.forEach(a => { if(a.day && appData.activities[a.day]) appData.activities[a.day].push(a); }); }
          if (cloud.Expenses) appData.budget.expenses = cloud.Expenses;
          if (cloud.Hotels) appData.hotels = cloud.Hotels;
          if (cloud.Checklist) { appData.checklist = {}; cloud.Checklist.forEach(i => { if(!appData.checklist[i.category]) appData.checklist[i.category]=[]; appData.checklist[i.category].push({id: i.id, text: i.text, done: (i.done===true||i.done==='TRUE')}); }); }
          if (cloud.Places) { appData.shanghai = cloud.Places.filter(p => p.city === 'shanghai'); appData.nanjing = cloud.Places.filter(p => p.city === 'nanjing'); }
          if (cloud.Notes) appData.notes = cloud.Notes;
          
          localStorage.setItem('chinaTripData', JSON.stringify(appData));
          renderPage(currentPage);
          showToast('อัปเดตข้อมูลตรงกับ Sheet แล้ว ✨', 'success');
        }
      } catch(e) { console.log('Offline Mode'); }
    }

    // เซฟลงเครื่องปุ๊บ โชว์ปั๊บ แล้วค่อยส่งไป Sheet แบบไม่รอ
    function saveData() {
      localStorage.setItem('chinaTripData', JSON.stringify(appData));
      renderPage(currentPage);
      fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ data: appData }) }).catch(() => {});
    }

    // ==================== 2. UTILS ====================
    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
    function getDayDate(dayNum) { const d = new Date(appData.startDate); d.setDate(d.getDate() + dayNum - 1); return d; }
    function formatCurrency(amount) { return '฿' + (amount || 0).toLocaleString(); }
    function closeMobileMenu() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobileMenuOverlay').classList.add('hidden'); }
    function openMobileMenu() { document.getElementById('sidebar').classList.add('open'); document.getElementById('mobileMenuOverlay').classList.remove('hidden'); }
    function openModal(content) { document.getElementById('modalContent').innerHTML = content; document.getElementById('modalContainer').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modalContainer').classList.add('hidden'); editingItem = null; }
    
    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `px-5 py-3 rounded-full shadow-lg flex items-center justify-center gap-2 text-sm font-bold ${type==='success'?'bg-green-600 text-white':'bg-red-600 text-white'}`;
      t.innerHTML = `<span>${msg}</span>`;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2000);
    }

    function updateCountdown() {
      const now = new Date(); const tripStart = new Date(appData.startDate); const diff = tripStart - now;
      let text = diff < 0 ? (now <= new Date(appData.endDate) ? '🎉 กำลังเที่ยวอยู่จ้า!' : '✨ จบทริปแล้ว') : `อีก ${Math.ceil(diff / (1000 * 60 * 60 * 24))} วันบิน!`;
      const cdEl = document.getElementById('countdownText'); if(cdEl) cdEl.textContent = text;
      const homeCdEl = document.getElementById('homeCountdown'); if(homeCdEl) homeCdEl.textContent = text;
    }

    function navigateTo(page) {
      currentPage = page; closeMobileMenu();
      document.querySelectorAll('.nav-item').forEach(item => { item.classList.remove('active'); if (item.dataset.page === page) item.classList.add('active'); });
      const titles = { home:'หน้าหลัก', shanghai:'เซี่ยงไฮ้', nanjing:'หนานจิง', budget:'งบประมาณ', hotel:'ที่พัก', checklist:'เช็คลิสต์', survival:'การ์ดเอาตัวรอด' };
      document.getElementById('mobileTitle').textContent = page.startsWith('day') ? `วันที่ ${page.replace('day','')}` : (titles[page] || '');
      renderPage(page);
    }

    function renderPage(page) {
      const content = document.getElementById('mainContent');
      let html = '';
      if (page === 'home') html = renderHomePage();
      else if (page.startsWith('day')) { html = renderDayPage(parseInt(page.replace('day', ''))); setTimeout(initSortable, 100); }
      else if (page === 'shanghai' || page === 'nanjing') html = renderCityPage(page);
      else if (page === 'budget') html = renderBudgetPage();
      else if (page === 'hotel') html = renderHotelPage();
      else if (page === 'checklist') html = renderChecklistPage();
      else if (page === 'notes') html = renderNotesPage();
      else if (page === 'survival') html = renderSurvivalPage();
      
      content.innerHTML = `<div class="animate-fade-in">${html}</div>`;
      content.scrollTop = 0;
    }

    // ==================== 3. PAGES ====================
    function renderHomePage() {
      const spent = appData.budget.expenses.reduce((s, e) => s + e.amount, 0);
      const totalActs = Object.values(appData.activities).flat().length;
      return `
        <div class="p-4 md:p-8 space-y-6">
          <div class="bg-gradient-to-r from-red-500 to-red-600 rounded-2xl p-6 text-white shadow-lg flex items-center justify-between">
            <div><p class="text-red-100 text-sm">เตรียมตัวให้พร้อม!</p><h2 class="text-3xl font-bold mt-1" id="homeCountdown"></h2></div><div class="text-5xl animate-float">🐼</div>
          </div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <button onclick="navigateTo('shanghai')" class="bg-white p-5 rounded-2xl border border-amber-100 shadow-sm text-center card-hover"><span class="text-3xl mb-2 block">🏙️</span><p class="font-bold text-amber-900">เซี่ยงไฮ้</p><p class="text-xs text-amber-500">${appData.shanghai.length} ที่</p></button>
            <button onclick="navigateTo('nanjing')" class="bg-white p-5 rounded-2xl border border-amber-100 shadow-sm text-center card-hover"><span class="text-3xl mb-2 block">🏛️</span><p class="font-bold text-amber-900">หนานจิง</p><p class="text-xs text-amber-500">${appData.nanjing.length} ที่</p></button>
            <button onclick="navigateTo('budget')" class="bg-white p-5 rounded-2xl border border-amber-100 shadow-sm text-center card-hover"><span class="text-3xl mb-2 block">💸</span><p class="font-bold text-red-600">${formatCurrency(spent)}</p><p class="text-xs text-amber-500">ใช้ไปแล้ว</p></button>
            <button onclick="navigateTo('survival')" class="bg-white p-5 rounded-2xl border border-amber-100 shadow-sm text-center card-hover"><span class="text-3xl mb-2 block">🀄️</span><p class="font-bold text-amber-900">เอาตัวรอด</p><p class="text-xs text-amber-500">รวมคำฮิต</p></button>
          </div>
          <h3 class="font-bold text-lg text-amber-900 mt-6 mb-3">แพลนรายวัน</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${[1,2,3,4,5,6,7].map(d => {
              const acts = appData.activities[`day${d}`] || []; const date = getDayDate(d);
              return `<button onclick="navigateTo('day${d}')" class="bg-white p-4 rounded-xl border border-amber-100 flex justify-between items-center card-hover"><div class="flex items-center gap-4"><span class="w-10 h-10 rounded-xl bg-red-50 text-red-600 flex items-center justify-center font-bold">D${d}</span><div class="text-left"><p class="font-bold text-amber-900">${date.toLocaleDateString('th-TH', {month:'short', day:'numeric'})}</p><p class="text-xs text-amber-500">${acts.length} แพลน</p></div></div><span class="text-amber-300">❯</span></button>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderDayPage(dayNum) {
      const dayKey = `day${dayNum}`; const acts = appData.activities[dayKey] || []; const date = getDayDate(dayNum);
      return `
        <div class="p-4 md:p-8 space-y-6">
          <div class="flex justify-between items-center bg-white/80 backdrop-blur-md p-4 rounded-2xl border border-amber-100 shadow-sm sticky top-0 z-10">
            <div><h1 class="text-2xl font-bold text-amber-900">วันที่ ${dayNum}</h1><p class="text-xs text-amber-600">${date.toLocaleDateString('th-TH', {weekday:'long', month:'long', day:'numeric'})}</p></div>
            <button onclick="openAddActivityModal('${dayKey}')" class="btn-primary px-4 py-2 rounded-xl text-white font-medium shadow-md">➕ เพิ่ม</button>
          </div>
          <p class="text-sm text-amber-600 text-center bg-amber-50 py-2 rounded-xl border border-amber-100">💡 แตะค้างที่ไอคอน ≡ ด้านซ้าย เพื่อลากสลับแพลนเที่ยว</p>
          <div id="activityList" data-day="${dayKey}" class="space-y-3 pb-20">
            ${acts.length === 0 ? `<div class="text-center py-10 opacity-50"><span class="text-4xl block mb-2">📅</span><p>ยังไม่มีแพลน</p></div>` : 
              acts.map(act => `
              <div class="bg-white rounded-xl p-4 border border-amber-100 shadow-sm flex items-stretch gap-3 group relative">

    function renderChecklistPage() { return `<div class="p-4 md:p-8 space-y-6"><div class="flex justify-between items-center"><h1 class="text-2xl font-bold text-amber-900">✅ เช็คลิสต์</h1><button onclick="openAddChecklistModal()" class="btn-primary px-4 py-2 rounded-xl text-white">➕ เพิ่มของ</button></div><div class="space-y-4">${Object.entries(appData.checklist).map(([cat,items])=>`<div class="bg-white rounded-2xl border border-amber-100 overflow-hidden shadow-sm"><div class="px-5 py-3 bg-amber-50 font-bold text-amber-900 border-b border-amber-100">${cat}</div><div class="divide-y divide-amber-50">${items.map(i=>`<label class="flex items-center gap-4 px-5 py-4 cursor-pointer hover:bg-gray-50"><input type="checkbox" class="checkbox-custom" ${i.done?'checked':''} onchange="toggleChecklist('${cat}',${i.id})"><span class="flex-1 font-medium ${i.done?'text-gray-400 line-through':'text-gray-700'}">${i.text}</span><button onclick="event.preventDefault();deleteChecklist('${cat}',${i.id})" class="text-gray-300 hover:text-red-500">❌</button></label>`).join('')}</div></div>`).join('')}</div></div>`; }

    function openAddActivityModal(dayKey) { openModal(`<div class="p-8"><h2 class="text-xl font-bold text-amber-900 mb-6">${editingItem?'แก้ไขแพลน':'เพิ่มแพลน'}</h2><form onsubmit="saveActivity(event, '${dayKey}')" class="space-y-4"><div class="flex gap-4"><input type="time" id="actTime" value="${editingItem?.time||''}" class="w-1/3 px-4 py-3 border border-amber-200 rounded-xl"><input type="text" id="actName" required value="${editingItem?.name||''}" placeholder="ชื่อสถานที่ *" class="w-2/3 px-4 py-3 border border-amber-200 rounded-xl"></div><textarea id="actNote" placeholder="จดโน้ตสั้นๆ..." rows="3" class="w-full px-4 py-3 border border-amber-200 rounded-xl">${editingItem?.note||''}</textarea><div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold">ยกเลิก</button><button type="submit" class="flex-1 btn-primary text-white py-3 rounded-xl font-bold">บันทึก</button></div></form></div>`); }
    function saveActivity(e, dayKey) { e.preventDefault(); const obj = { id: editingItem?.id||generateId(), time: document.getElementById('actTime').value, name: document.getElementById('actName').value, note: document.getElementById('actNote').value }; if(editingItem) { const i = appData.activities[dayKey].findIndex(a=>a.id===editingItem.id); appData.activities[dayKey][i] = obj; } else { appData.activities[dayKey].push(obj); } saveData(); closeModal(); }
    function editActivity(day, id) { editingItem = appData.activities[day].find(a=>a.id===id); openAddActivityModal(day); }
    function deleteActivity(day, id) { appData.activities[day] = appData.activities[day].filter(a=>a.id!==id); saveData(); }

    function openAddPlaceModal(cityKey) { openModal(`<div class="p-8"><h2 class="text-xl font-bold text-amber-900 mb-6">เพิ่มที่เที่ยว</h2><form onsubmit="savePlace(event, '${cityKey}')" class="space-y-4"><input type="text" id="pName" required value="${editingItem?.name||''}" placeholder="ชื่อสถานที่ *" class="w-full px-4 py-3 border border-amber-200 rounded-xl"><textarea id="pNote" placeholder="จดโน้ต..." rows="2" class="w-full px-4 py-3 border border-amber-200 rounded-xl">${editingItem?.note||''}</textarea><div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold">ยกเลิก</button><button type="submit" class="flex-1 btn-primary text-white py-3 rounded-xl font-bold">บันทึก</button></div></form></div>`); }
    function savePlace(e, cityKey) { e.preventDefault(); const obj = { id: editingItem?.id||generateId(), name: document.getElementById('pName').value, note: document.getElementById('pNote').value }; if(editingItem) { const i = appData[cityKey].findIndex(p=>p.id===editingItem.id); appData[cityKey][i]=obj; } else appData[cityKey].push(obj); saveData(); closeModal(); }
    function editPlace(city, id) { editingItem = appData[city].find(p=>p.id===id); openAddPlaceModal(city); }
    function deletePlace(city, id) { appData[city] = appData[city].filter(p=>p.id!==id); saveData(); }

    function openAddExpenseModal() { openModal(`<div class="p-8"><h2 class="text-xl font-bold text-amber-900 mb-6">บันทึกรายจ่าย</h2><form onsubmit="saveExpense(event)" class="space-y-4"><input type="text" id="expenseDesc" required placeholder="ค่าอะไรเอ่ย? *" class="w-full px-4 py-3 border border-amber-200 rounded-xl"><div class="p-4 bg-amber-50 rounded-xl border border-amber-200"><p class="text-xs font-bold text-center mb-3 text-amber-800">เครื่องคิดเลข (1 หยวน = 4.7 บาท)</p><div class="flex gap-3 items-center"><div class="relative w-1/2"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold">¥</span><input type="number" id="expenseCNY" oninput="calculateTHB()" placeholder="0" class="w-full pl-10 pr-3 py-3 border border-amber-200 rounded-xl font-bold"></div><span class="text-gray-400 font-bold">=</span><div class="relative w-1/2"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-red-600 font-bold">฿</span><input type="number" id="expenseAmount" required placeholder="0" class="w-full pl-10 pr-3 py-3 border-2 border-red-400 rounded-xl font-bold text-red-600"></div></div></div><div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold">ยกเลิก</button><button type="submit" class="flex-1 btn-primary text-white py-3 rounded-xl font-bold">บันทึก</button></div></form></div>`); }

    function deleteExpense(id) { appData.budget.expenses = appData.budget.expenses.filter(e=>e.id!==id); saveData(); }

    function openAddHotelModal() { openModal(`<div class="p-8"><h2 class="text-xl font-bold text-amber-900 mb-6">เพิ่มที่พัก</h2><form onsubmit="saveHotel(event)" class="space-y-4"><input type="text" id="hName" required placeholder="ชื่อโรงแรม *" class="w-full px-4 py-3 border border-amber-200 rounded-xl"><div class="flex gap-3"><div class="w-1/2"><label class="text-xs ml-2 text-gray-500 font-bold">IN</label><input type="date" id="hIn" class="w-full px-4 py-3 border border-amber-200 rounded-xl mt-1"></div><div class="w-1/2"><label class="text-xs ml-2 text-gray-500 font-bold">OUT</label><input type="date" id="hOut" class="w-full px-4 py-3 border border-amber-200 rounded-xl mt-1"></div></div><textarea id="hCN" placeholder="ที่อยู่ภาษาจีน (เอาไว้เปิดให้แท็กซี่ดู) *" required rows="3" class="w-full px-4 py-3 bg-yellow-50 border-2 border-amber-400 rounded-xl"></textarea><div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold">ยกเลิก</button><button type="submit" class="flex-1 btn-primary text-white py-3 rounded-xl font-bold">บันทึก</button></div></form></div>`); }
    function saveHotel(e) { e.preventDefault(); appData.hotels.push({ id: generateId(), name: document.getElementById('hName').value, checkIn: document.getElementById('hIn').value, checkOut: document.getElementById('hOut').value, chineseAddress: document.getElementById('hCN').value }); saveData(); closeModal(); }

    function openAddChecklistModal() { openModal(`<div class="p-8"><h2 class="text-xl font-bold text-amber-900 mb-6">เพิ่มเช็คลิสต์</h2><form onsubmit="saveChecklist(event)" class="space-y-4"><input type="text" id="cText" required placeholder="สิ่งที่ต้องทำ/เตรียม..." class="w-full px-4 py-3 border border-amber-200 rounded-xl"><select id="cCat" class="w-full px-4 py-3 border border-amber-200 rounded-xl"><option value="เตรียมตัว">เตรียมตัว</option></select><div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold">ยกเลิก</button><button type="submit" class="flex-1 btn-primary text-white py-3 rounded-xl font-bold">บันทึก</button></div></form></div>`); }
    function saveChecklist(e) { e.preventDefault(); const cat = document.getElementById('cCat').value; if(!appData.checklist[cat]) appData.checklist[cat]=[]; appData.checklist[cat].push({ id: generateId(), text: document.getElementById('cText').value, done: false }); saveData(); closeModal(); }

    function openAddNoteModal() { openModal(`<div class="p-8"><h2 class="text-xl font-bold text-amber-900 mb-6">เพิ่มสมุดโน้ต</h2><form onsubmit="saveNote(event)" class="space-y-4"><input type="text" id="nTitle" placeholder="หัวข้อ" class="w-full px-4 py-3 border border-amber-200 rounded-xl"><textarea id="nContent" required placeholder="รายละเอียด..." rows="5" class="w-full px-4 py-3 border border-amber-200 rounded-xl"></textarea><div class="flex gap-3 pt-2"><button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold">ยกเลิก</button><button type="submit" class="flex-1 btn-primary text-white py-3 rounded-xl font-bold">บันทึก</button></div></form></div>`); }
    function saveNote(e) { e.preventDefault(); appData.notes.push({ id: generateId(), title: document.getElementById('nTitle').value, content: document.getElementById('nContent').value }); saveData(); closeModal(); }
    function deleteNote(id) { appData.notes = appData.notes.filter(n=>n.id!==id); saveData(); }

    // ==================== 5. INIT ====================
    document.getElementById('mobileMenuBtn').addEventListener('click', openMobileMenu);
    window.onload = () => { 
      renderPage('home'); 
      updateCountdown(); setInterval(updateCountdown, 60000);
      backgroundSync();
    };
  </script>
</body>
</html>
